<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    .container {
      width: 50%;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid gray;
    }

    th {
      background: #333;
      color: white;
    }

    .delete-btn {
      background: red;
    }
  </style>
</head>
<body>

  <h1>📚 Student Management System</h1>

  <div class="container">
    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="text" id="roll" placeholder="Enter Roll Number"><br>
    <input type="text" id="course" placeholder="Enter Course"><br>

    <button onclick="addStudent()">Add Student</button>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Roll</th>
          <th>Course</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentList"></tbody>
    </table>
  </div>

  <script>
    let students = JSON.parse(localStorage.getItem("students")) || [];

    function displayStudents() {
      let table = document.getElementById("studentList");
      table.innerHTML = "";

      students.forEach((student, index) => {
        table.innerHTML += `
          <tr>
            <td>${student.name}</td>
            <td>${student.roll}</td>
            <td>${student.course}</td>
            <td><button class="delete-btn" onclick="deleteStudent(${index})">Delete</button></td>
          </tr>
        `;
      });
    }

    function addStudent() {
      let name = document.getElementById("name").value;
      let roll = document.getElementById("roll").value;
      let course = document.getElementById("course").value;

      if (name === "" || roll === "" || course === "") {
        alert("Please fill all fields!");
        return;
      }

      students.push({ name, roll, course });
      localStorage.setItem("students", JSON.stringify(students));

      document.getElementById("name").value = "";
      document.getElementById("roll").value = "";
      document.getElementById("course").value = "";

      displayStudents();
    }

    function deleteStudent(index) {
      students.splice(index, 1);
      localStorage.setItem("students", JSON.stringify(students));
      displayStudents();
    }

    // Load data on page load
    displayStudents();
  </script>

</body>
</html>
